<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social | Monster Games</title>
  <link rel="stylesheet" href="../Assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="glass-header">
    <div class="logo-wrap">
      <span class="logo-claw">M</span>
      <span class="logo-text">ONSTER</span>
    </div>
  </header>

  <main class="pages">
    <section class="page active" id="page-social">
      <div class="page-header">
        <h2 class="page-title">YOUR <span class="green">SOCIAL</span></h2>
        <p class="page-sub">Check your feed and connect with your squad.</p>
      </div>

      <div class="glass-card cart-container">
        <div class="cart-empty" id="cart-empty">
          <span class="empty-icon">💬</span>
          <p>Your social feed is empty.<br/>Add gear to start your run.</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav glass-nav">
    <a class="nav-btn" href="../index.html" onclick="location.replace(this.href); return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-btn" href="weapons.html" onclick="location.replace(this.href); return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Library</span>
    </a>
    <button class="nav-btn nav-center" id="time-btn" type="button">
      <div class="claw-logo">☰</div>
    </button>
    <a class="nav-btn" href="social.html">
      <div class="cart-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <span>Social</span>
    </a>
    <a class="nav-btn" href="profile.html" onclick="location.replace(this.href); return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <div class="time-panel" id="time-panel">
    <div class="time-panel-card">
      <div class="time-row">
        <span class="time-value" id="time-value">--:--</span>
        <span class="date-value" id="date-value">Loading...</span>
      </div>
      <div class="weather-row">
        <span class="weather-icon">🌤️</span>
        <span class="weather-text" id="weather-text">Checking weather...</span>
      </div>
    </div>
  </div>

  <script src="../Assets/script.js"></script>
</body>
</html>
